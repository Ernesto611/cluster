<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ notificacion.titulo }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Imprima&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Imprima',Arial,sans-serif;background:#f4f4f4;margin:0;padding:0}
    .container{max-width:600px;background:#fff;margin:30px auto;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,.1)}
    .header{text-align:center;padding:10px 20px}
    .header img{width:100px;height:auto}
    .content{padding:10px 20px;text-align:left}
    h2{color:#2D3142;margin:0 0 10px}
    p{font-size:16px;color:#555;line-height:1.5}
    .btn{display:inline-block;margin-top:16px;padding:12px 18px;background:#7630f3;color:#fff;text-decoration:none;border-radius:6px;font-size:16px}
    .hero-img{width:100%;max-height:240px;object-fit:cover;border-radius:8px;margin:10px 0 12px}
    .footer{text-align:center;padding:16px 20px;font-size:12px;color:#999}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="https://registroclustertim.com">
        <img src="https://registroclustertim.com/static/web/images/logo_cluster2.png" alt="Logo">
      </a>
    </div>
    <div class="content">
      <h2>{{ notificacion.titulo }}</h2>

      {% if notificacion.imagen %}
      <img class="hero-img" src="{{ notificacion.imagen.url }}" alt="Imagen">
      {% endif %}

      <p>{{ notificacion.mensaje|linebreaksbr }}</p>

    </div>
    <div class="footer">
      <p>&copy; 2025 EVENTOS CLUSTERTIM — Todos los derechos reservados.</p>
    </div>
  </div>
</body>
</html>
