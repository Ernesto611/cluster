<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablece tu Contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=Imprima&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Imprima', Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            background: white;
            margin: 30px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            padding: 20px;
        }
        .header img {
            width: 100px;
        }
        .content {
            text-align: center;
            padding: 20px;
        }
        .content h2 {
            color: #2D3142;
        }
        .content p {
            font-size: 16px;
            color: #555;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 25px;
            background-color: #7630f3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="https://registroclustertim.com">
                <img src="https://registroclustertim.com/static/web/images/logo_cluster2.png" alt="Logo">
            </a>
        </div>
        <div class="content">
            <h2>¡Hola!</h2>
            <p>Recibimos una solicitud para restablecer tu contraseña en EVENTOS CLUSTERTIM.</p>
            <p>Haz clic en el siguiente botón para crear una nueva contraseña:</p>
            <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" class="button">Restablecer Contraseña</a>
            <p>Si no hiciste esta solicitud, puedes ignorar este mensaje.</p>
        </div>
        <div class="footer">
            <p>&copy; 2024 EVENTOS CLUSTERTIM - Todos los derechos reservados.</p>
        </div>
    </div>
</body>
</html>
