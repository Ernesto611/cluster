{% extends "web/layouts/base.html" %}
{% block title %}Recuperar Contraseña{% endblock %}
{% block content %}
<div class="auth-page-wrapper pt-5">
    <div class="auth-page-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5">
                    <div class="card mt-4">
                        <div class="card-body p-4 text-center">
                            <h5 class="text-primary">Recuperar Contraseña</h5>
                            <p class="text-muted">Ingresa tu correo y te enviaremos instrucciones.</p>
                            <form method="post">
                                {% csrf_token %}
                                {{ form.email.label_tag }}
                                {{ form.email }}
                                <br>
                                <button type="submit" class="btn btn-secondary w-100 mt-3">Enviar</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
