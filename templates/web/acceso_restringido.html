	position: relative;

	animation-delay: 1.7s;
  }

	color: #f6c667;
	z-index: -1;
	text-align: center;
	animation: lock 0.2s ease-in-out forwards;
	animation-delay: 1.5s;
  }

	color: #ca3074;
	animation-delay: 3s;

	50% {

	100% {
	  top: -6%;
	}
  }

	50% {
	  transform: scale(1.1);
	}
	100% {
	  color: #ca3074;
	}
  }
  @keyframes show {
	100% {
	  opacity: 1;
	}
  }
