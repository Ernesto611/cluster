{% extends "web/layouts/base.html" %}
{% block title %}Restablecer Contraseña{% endblock %}
{% block content %}
<div class="auth-page-wrapper pt-5">
    <div class="auth-page-content">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6 col-xl-5">
                    <div class="card mt-4">
                        <div class="card-body p-4 text-center">
                            <h5 class="text-primary">Nueva Contraseña</h5>
                            <p class="text-muted">Ingresa tu nueva contraseña abajo.</p>
                            <form method="post">
                                {% csrf_token %}
                                {{ form.as_p }}
                                <button type="submit" class="btn btn-secondary w-100 mt-3">Restablecer</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
